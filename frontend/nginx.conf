# ── Rate-limit zones ──────────────────────────────────────────────────────────
# Must be defined at http level — injected via the server block include trick.
# Since CRA's nginx image uses conf.d/, we put limit_req_zone in a separate
# snippet file. Here we declare it inline and reference it below.

server {
    listen 80;
    server_tokens off;                         # hide nginx version
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Content-Type-Options      "nosniff"                           always;
    add_header X-Frame-Options             "DENY"                              always;
    add_header X-XSS-Protection            "1; mode=block"                     always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy          "camera=(), microphone=(), payment=()" always;
    add_header Content-Security-Policy
        "default-src 'self';
         script-src  'self';
         style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src    'self' https://fonts.gstatic.com;
         img-src     'self' data: https://*.tile.openstreetmap.org https://*.openstreetmap.org;
         connect-src 'self' http://localhost:8000 https://ip-api.com;
         frame-ancestors 'none';"            always;

    # ── Gzip compression ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    # ── Static asset caching ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Repeat security headers (add_header doesn't inherit in sub-locations)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "DENY"    always;
    }

    # ── API proxy → backend ───────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;

        # Don't expose backend error details to the client
        proxy_intercept_errors off;

        # Limit request body forwarded to backend (64 KB)
        client_max_body_size 64k;
    }

    location /health {
        proxy_pass         http://backend:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # No caching for the HTML shell (so updates deploy instantly)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        # Security headers for HTML responses
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header X-Frame-Options        "DENY"                            always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }
}
