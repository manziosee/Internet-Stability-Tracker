<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <circle cx="32" cy="32" r="32" fill="#0a0800"/>
  <!-- Outer gold ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#f0c24b" stroke-width="1.5" opacity="0.35"/>
  <!-- WiFi arc large -->
  <path d="M10 30 a24 24 0 0 1 44 0"
        fill="none" stroke="#f0c24b" stroke-width="4.5"
        stroke-linecap="round" opacity="0.7"/>
  <!-- WiFi arc medium -->
  <path d="M17 36 a17 17 0 0 1 30 0"
        fill="none" stroke="#f0c24b" stroke-width="4.5"
        stroke-linecap="round" opacity="0.85"/>
  <!-- WiFi arc small -->
  <path d="M24 42 a10 10 0 0 1 16 0"
        fill="none" stroke="#f0c24b" stroke-width="4.5"
        stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="50" r="4.5" fill="#f0c24b"/>
  <!-- Pulse ring on dot -->
  <circle cx="32" cy="50" r="7" fill="none" stroke="#f0c24b" stroke-width="1.5" opacity="0.4"/>
</svg>
