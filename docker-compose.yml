version: '3.8'

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      TURSO_DB_URL:          ${TURSO_DB_URL}
      TURSO_AUTH_TOKEN:      ${TURSO_AUTH_TOKEN}
      SECRET_KEY:            ${SECRET_KEY:-internet-stability-tracker-secret}
      ENVIRONMENT:           ${ENVIRONMENT:-production}
      SPEED_TEST_INTERVAL:   ${SPEED_TEST_INTERVAL:-300}
      OUTAGE_THRESHOLD_MBPS: ${OUTAGE_THRESHOLD_MBPS:-1.0}
      CORS_ORIGINS:          '["http://localhost","http://localhost:80"]'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React Frontend served via nginx ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
