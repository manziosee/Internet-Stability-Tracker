version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: internet_tracker
      POSTGRES_USER: tracker_user
      POSTGRES_PASSWORD: tracker_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://tracker_user:tracker_pass@postgres:5432/internet_tracker
    depends_on:
      - postgres
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: