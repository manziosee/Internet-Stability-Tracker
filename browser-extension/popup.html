<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Internet Stability Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 320px; background: #0a0a1a; color: #e0e0e0;
    }
    .header {
      background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
      padding: 14px 16px; display: flex; align-items: center; gap: 10px;
    }
    .header h1 { font-size: 14px; font-weight: 700; color: #fff; }
    .status-bar {
      padding: 8px 16px; font-size: 12px;
      display: flex; align-items: center; gap: 6px;
      background: #111127;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.healthy  { background: #43A047; box-shadow: 0 0 6px #43A047; }
    .dot.degraded { background: #FFA726; }
    .dot.outage   { background: #EF5350; box-shadow: 0 0 6px #EF5350; }
    .dot.unknown  { background: #757575; }
    .metrics {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 1px; background: #1e1e2e;
    }
    .metric { background: #12122a; padding: 16px 8px; text-align: center; }
    .metric .val  { font-size: 22px; font-weight: 800; color: #42A5F5; line-height: 1; }
    .metric .unit { font-size: 10px; color: #90a4ae; margin-top: 3px; }
    .metric .lbl  { font-size: 11px; color: #b0bec5; margin-top: 5px; }
    .actions { padding: 12px 16px; display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 10px 8px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.15s;
    }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-primary   { background: #1565C0; color: #fff; }
    .btn-secondary { background: #1e2d3d; color: #90caf9; border: 1px solid #263545; }
    .footer {
      padding: 6px 16px 12px; font-size: 11px; color: #546e7a; text-align: center;
    }
    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid #fff; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌐 Internet Stability Tracker</h1>
  </div>

  <div class="status-bar">
    <div class="dot unknown" id="statusDot"></div>
    <span id="statusText">Checking…</span>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="val" id="dlVal">—</div>
      <div class="unit">Mbps</div>
      <div class="lbl">Download</div>
    </div>
    <div class="metric">
      <div class="val" id="ulVal">—</div>
      <div class="unit">Mbps</div>
      <div class="lbl">Upload</div>
    </div>
    <div class="metric">
      <div class="val" id="pgVal">—</div>
      <div class="unit">ms</div>
      <div class="lbl">Ping</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary"   id="testBtn">Run Speed Test</button>
    <button class="btn btn-secondary" id="openBtn">Dashboard ↗</button>
  </div>

  <div class="footer" id="lastTest">No test run yet</div>

  <script src="popup.js"></script>
</body>
</html>
