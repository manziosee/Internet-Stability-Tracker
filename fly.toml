# fly.toml — Internet Stability Tracker on Fly.io
# Single-container deploy: FastAPI backend serves the React SPA as static files.
#
# Setup steps:
#   fly launch --no-deploy          (first time only — creates the app)
#   fly secrets set TURSO_DB_URL=libsql://... TURSO_AUTH_TOKEN=... SECRET_KEY=...
#   fly deploy

app            = "internet-stability-tracker"
primary_region = "jnb"       # Johannesburg — closest Fly region to East Africa

# ── Build ─────────────────────────────────────────────────────────────────────
[build]
  dockerfile = "Dockerfile"  # root single-container Dockerfile (frontend + backend)

  [build.args]
    REACT_APP_API_URL = "/api"

# ── Static env (non-secret) ───────────────────────────────────────────────────
[env]
  PORT            = "8000"
  ENVIRONMENT     = "production"
  AUTO_SPEED_TEST = "false"
  # Secrets (never commit): TURSO_DB_URL, TURSO_AUTH_TOKEN, SECRET_KEY
  # Set them with:  fly secrets set KEY=value ...

# ── HTTP service ──────────────────────────────────────────────────────────────
[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

  # Health check — FastAPI /health endpoint
  [[http_service.checks]]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "10s"

# ── VM sizing ─────────────────────────────────────────────────────────────────
[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 512

# ── Deployment ────────────────────────────────────────────────────────────────
[deploy]
  strategy          = "rolling"
  release_command   = ""        # add `alembic upgrade head` if you add migrations
