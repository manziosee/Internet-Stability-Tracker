# ── CI — runs on every push and PR ────────────────────────────────────────────
# Checks: Python lint + import test  •  React build

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Verify imports (smoke test)
        working-directory: backend
        env:
          TURSO_DB_URL: "libsql://test.example.com"
          TURSO_AUTH_TOKEN: "test-token"
          SECRET_KEY: "ci-secret-key-for-testing-only"
        run: python -c "from app.core.config import settings; print('Config OK')"

      - name: Run tests (if any exist)
        working-directory: backend
        env:
          TURSO_DB_URL: "libsql://test.example.com"
          TURSO_AUTH_TOKEN: "test-token"
          SECRET_KEY: "ci-secret-key-for-testing-only"
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests directory found — skipping pytest"
          fi

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_API_URL: "https://backend-cold-butterfly-9535.fly.dev/api"
          CI: "false"           # treat warnings as warnings, not errors
          DISABLE_ESLINT_PLUGIN: "true"   # speed up CI build, lint runs separately
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 3
