# fly.toml — Internet Stability Tracker backend
# app: backend-cold-butterfly-9535

app            = 'backend-cold-butterfly-9535'
primary_region = 'lhr'

[build]

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = 'suspend'
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

[[vm]]
  # 2 GB RAM to comfortably run Python (uvicorn ×2) + Rust probe + Go agent
  # and still have headroom for ML workloads (scikit-learn, numpy).
  memory      = '2gb'
  cpu_kind    = 'shared'
  cpus        = 2
  memory_mb   = 2048
